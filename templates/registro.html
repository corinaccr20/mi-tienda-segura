{% extends "base.html" %}
{% block content %}
<h2>Registro de Usuario</h2>
<form method="POST">
    <input type="text" name="nombre" placeholder="Nombre" required class="form-control mb-2">
    <input type="email" name="email" placeholder="Email" required class="form-control mb-2">
    <input type="password" name="password" placeholder="Contraseña" required class="form-control mb-2">
    <button type="submit" class="btn btn-primary">Registrarse</button>
</form>
<p class="mt-2">¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia Sesión</a></p>
{% endblock %}
