{% extends "base.html" %}
{% block content %}
<h2>Nuestros Productos</h2>
<div class="row">
    {% for producto in productos %}
    <div class="col-md-4 mb-3">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ producto.nombre }}</h5>
                <p class="card-text">{{ producto.descripcion[:50] }}...</p>
                <p class="card-text"><strong>${{ producto.precio }}</strong></p>
                <p class="card-text"><small>Stock: {{ producto.stock }}</small></p>
                <a href="{{ url_for('comprar', producto_id=producto.id) }}" class="btn btn-success">Comprar</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
